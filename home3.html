<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM Call Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"
    }
  }
  </script>
  <style>
    * { font-family: 'DM Sans', sans-serif; }
    .mono { font-family: 'DM Mono', monospace; }

    :root {
      --bg: #0f1117;
      --surface: #181c27;
      --surface2: #1e2336;
      --border: #272d42;
      --border2: #2e3550;
      --accent: #3b82f6;
      --accent2: #6366f1;
      --text: #e8eaf0;
      --text2: #8b92a8;
      --text3: #5c6380;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --purple: #a855f7;
      --cyan: #06b6d4;
    }

    body { background: var(--bg); color: var(--text); min-height: 100vh; }

    .surface { background: var(--surface); }
    .surface2 { background: var(--surface2); }
    .border-main { border-color: var(--border); }
    .border-main2 { border-color: var(--border2); }

    .input-field {
      background: var(--bg);
      border: 1px solid var(--border2);
      color: var(--text);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 13px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-field::placeholder { color: var(--text3); }
    .input-field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }

    select.input-field option { background: var(--surface2); color: var(--text); }

    .label-text { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; display: block; }

    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white; font-weight: 700; border-radius: 10px;
      padding: 10px 18px; font-size: 13px; width: 100%;
      border: none; cursor: pointer; transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.01em;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: var(--border2); }

    .client-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 10px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .client-card:hover { border-color: var(--border2); box-shadow: 0 4px 24px rgba(0,0,0,0.25); }

    /* STATUS BADGES */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 600; padding: 3px 9px;
      border-radius: 20px; letter-spacing: 0.02em;
    }
    .badge-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

    /* Contact method badges */
    .cm-call    { background: rgba(59,130,246,0.12); color: #60a5fa; border: 1px solid rgba(59,130,246,0.2); }
    .cm-msg     { background: rgba(34,197,94,0.12);  color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }
    .cm-email   { background: rgba(168,85,247,0.12); color: #c084fc; border: 1px solid rgba(168,85,247,0.2); }
    .cm-dot-call  { background: #60a5fa; }
    .cm-dot-msg   { background: #4ade80; }
    .cm-dot-email { background: #c084fc; }

    /* Reply badge */
    .reply-yes { background: rgba(34,197,94,0.12);  color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }
    .reply-no  { background: rgba(239,68,68,0.12);  color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
    .reply-dot-yes { background: #4ade80; }
    .reply-dot-no  { background: #f87171; }

    /* Deal status */
    .deal-done      { background: rgba(34,197,94,0.12);  color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }
    .deal-talking   { background: rgba(245,158,11,0.12); color: #fbbf24; border: 1px solid rgba(245,158,11,0.2); }
    .deal-rejected  { background: rgba(239,68,68,0.12);  color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
    .deal-no_response{ background: rgba(107,114,128,0.15);color: #9ca3af; border: 1px solid rgba(107,114,128,0.2); }
    .deal-not_started{ background: rgba(99,102,241,0.12); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.2); }
    .deal-dot-done       { background: #4ade80; }
    .deal-dot-talking    { background: #fbbf24; }
    .deal-dot-rejected   { background: #f87171; }
    .deal-dot-no_response{ background: #9ca3af; }
    .deal-dot-not_started{ background: #a5b4fc; }

    /* Call status (old field kept) */
    .cs-not_called { background: rgba(245,158,11,0.1); color: #fbbf24; border: 1px solid rgba(245,158,11,0.2); }
    .cs-called     { background: rgba(34,197,94,0.1);  color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }
    .cs-follow_up  { background: rgba(99,102,241,0.1); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.2); }

    .scrollbar-hidden::-webkit-scrollbar { display: none; }

    .icon-btn {
      background: transparent; border: none; cursor: pointer;
      padding: 6px; border-radius: 7px; color: var(--text3);
      transition: background 0.15s, color 0.15s;
    }
    .icon-btn:hover { background: var(--surface2); color: var(--text); }
    .icon-btn.danger:hover { background: rgba(239,68,68,0.1); color: #f87171; }

    .topbar { background: var(--surface); border-bottom: 1px solid var(--border); }

    .section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 14px; }

    .modal-overlay { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
    .modal-box { background: var(--surface); border: 1px solid var(--border2); border-radius: 18px; }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    /* Loading spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; }

    /* Stagger animation */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp 0.25s ease both; }

    .checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .cm-toggle {
      display: flex; align-items: center; gap: 6px;
      background: var(--bg); border: 1px solid var(--border2);
      border-radius: 8px; padding: 6px 11px; cursor: pointer;
      font-size: 12px; font-weight: 500; color: var(--text2);
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      user-select: none;
    }
    .cm-toggle input { display: none; }
    .cm-toggle.active-call  { border-color: #60a5fa; background: rgba(59,130,246,0.1); color: #60a5fa; }
    .cm-toggle.active-msg   { border-color: #4ade80; background: rgba(34,197,94,0.1);  color: #4ade80; }
    .cm-toggle.active-email { border-color: #c084fc; background: rgba(168,85,247,0.1); color: #c084fc; }

    .divider { border-color: var(--border); margin: 14px 0; }
  </style>
</head>
<body>

  <!-- LOADING -->
  <div id="loadingScreen" class="fixed inset-0 flex items-center justify-center z-50" style="background:var(--bg)">
    <div class="flex flex-col items-center gap-4">
      <svg class="w-10 h-10 spin" style="color:var(--accent)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" stroke-linecap="round"/>
      </svg>
      <p style="color:var(--text3); font-size:13px">Initialising CRM...</p>
    </div>
  </div>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="hidden fixed inset-0 flex items-center justify-center z-40" style="background:var(--bg)">
    <div style="background:var(--surface); border:1px solid var(--border2);" class="rounded-2xl shadow-2xl p-8 w-full max-w-sm mx-4 text-center">
      <!-- Logo -->
      <div class="flex items-center justify-center mb-6">
        <div style="background:linear-gradient(135deg,#3b82f6,#6366f1);width:48px;height:48px;border-radius:14px;" class="flex items-center justify-center">
          <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
          </svg>
        </div>
      </div>
      <h1 style="font-size:22px; font-weight:800; color:var(--text);">CRM Call Tracker</h1>
      <p style="color:var(--text3); font-size:13px; margin-top:6px; margin-bottom:28px;">Professional client relationship management</p>
      <button id="googleSignInBtn"
        style="background:var(--surface2); border:1px solid var(--border2); color:var(--text); border-radius:12px; padding:11px 18px; width:100%; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; transition:border-color 0.2s;"
        onmouseover="this.style.borderColor='#3b82f6'" onmouseout="this.style.borderColor=''">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" alt="Google" />
        Continue with Google
      </button>
      <p style="color:var(--text3); font-size:11px; margin-top:18px;">Your data is private and encrypted.</p>
    </div>
  </div>

  <!-- APP -->
  <div id="appScreen" class="hidden">

    <!-- TOPBAR -->
    <header class="topbar sticky top-0 z-30">
      <div class="max-w-screen-xl mx-auto px-5 h-14 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div style="background:linear-gradient(135deg,#3b82f6,#6366f1);width:32px;height:32px;border-radius:9px;" class="flex items-center justify-center flex-shrink-0">
            <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
            </svg>
          </div>
          <span style="font-weight:800; font-size:15px; letter-spacing:-0.01em;">CRM Tracker</span>
        </div>
        <div class="flex items-center gap-3">
          <img id="userPhoto" src="" alt="" class="w-7 h-7 rounded-full hidden" style="border:1px solid var(--border2)"/>
          <span id="userEmail" style="color:var(--text3); font-size:12px;" class="hidden sm:block max-w-[180px] truncate"></span>
          <button id="signOutBtn"
            style="font-size:12px; border:1px solid var(--border2); color:var(--text2); border-radius:8px; padding:5px 13px; background:transparent; cursor:pointer; font-weight:500; transition:border-color 0.2s, color 0.2s;"
            onmouseover="this.style.borderColor='#3b82f6';this.style.color='#60a5fa'" onmouseout="this.style.borderColor='';this.style.color=''">
            Sign Out
          </button>
        </div>
      </div>
    </header>

    <div class="max-w-screen-xl mx-auto px-5 pt-6 pb-14">

      <!-- STATS -->
      <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 mb-6">
        <div class="stat-card">
          <p class="label-text">Total</p>
          <p id="statTotal" style="font-size:26px;font-weight:800;color:var(--text);">0</p>
        </div>
        <div class="stat-card">
          <p class="label-text">Deal Done</p>
          <p id="statDone" style="font-size:26px;font-weight:800;color:#4ade80;">0</p>
        </div>
        <div class="stat-card">
          <p class="label-text">Talking</p>
          <p id="statTalking" style="font-size:26px;font-weight:800;color:#fbbf24;">0</p>
        </div>
        <div class="stat-card">
          <p class="label-text">Rejected</p>
          <p id="statRejected" style="font-size:26px;font-weight:800;color:#f87171;">0</p>
        </div>
        <div class="stat-card">
          <p class="label-text">No Response</p>
          <p id="statNoResp" style="font-size:26px;font-weight:800;color:#9ca3af;">0</p>
        </div>
        <div class="stat-card">
          <p class="label-text">Follow Up</p>
          <p id="statFollowUp" style="font-size:26px;font-weight:800;color:#a5b4fc;">0</p>
        </div>
      </div>

      <!-- GRID -->
      <div class="grid grid-cols-1 lg:grid-cols-[360px_1fr] gap-5">

        <!-- ADD FORM -->
        <aside class="lg:sticky lg:top-20 h-fit">
          <div style="background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:20px;">
            <p class="section-title">Add New Client</p>

            <div class="space-y-3">
              <div>
                <label class="label-text">Client Name <span style="color:#f87171">*</span></label>
                <input id="fName" type="text" placeholder="e.g. Rahul Sharma" class="input-field" />
              </div>
              <div>
                <label class="label-text">Phone Number <span style="color:#f87171">*</span></label>
                <input id="fPhone" type="tel" placeholder="e.g. 9876543210" class="input-field" />
              </div>
              <div>
                <label class="label-text">Email Address</label>
                <input id="fEmail" type="email" placeholder="client@example.com" class="input-field" />
              </div>
              <div>
                <label class="label-text">Location / City</label>
                <input id="fLocation" type="text" placeholder="e.g. Mumbai, Maharashtra" class="input-field" />
              </div>
              <div>
                <label class="label-text">Company / Business</label>
                <input id="fCompany" type="text" placeholder="e.g. Sharma Enterprises" class="input-field" />
              </div>
              <div>
                <label class="label-text">Website URL</label>
                <input id="fWebsite" type="url" placeholder="https://example.com" class="input-field" />
              </div>

              <hr class="divider">

              <!-- Contact Methods -->
              <div>
                <label class="label-text">Contact Method(s)</label>
                <div class="checkbox-group">
                  <label class="cm-toggle" id="fToggleCall">
                    <input type="checkbox" id="fMethodCall" />
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
                    Call
                  </label>
                  <label class="cm-toggle" id="fToggleMsg">
                    <input type="checkbox" id="fMethodMsg" />
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                    Message
                  </label>
                  <label class="cm-toggle" id="fToggleEmail">
                    <input type="checkbox" id="fMethodEmail" />
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                    Email
                  </label>
                </div>
              </div>

              <!-- Reply Status -->
              <div>
                <label class="label-text">Reply Status</label>
                <select id="fReply" class="input-field">
                  <option value="no">No Reply</option>
                  <option value="yes">Replied</option>
                </select>
              </div>

              <!-- Call Status -->
              <div>
                <label class="label-text">Call Status</label>
                <select id="fStatus" class="input-field">
                  <option value="not_called">Not Called</option>
                  <option value="called">Called</option>
                  <option value="follow_up">Follow Up</option>
                </select>
              </div>

              <!-- Deal Status -->
              <div>
                <label class="label-text">Deal Status</label>
                <select id="fDeal" class="input-field">
                  <option value="not_started">Not Started</option>
                  <option value="talking">In Discussion</option>
                  <option value="done">Deal Done</option>
                  <option value="rejected">Rejected</option>
                  <option value="no_response">No Response</option>
                </select>
              </div>

              <div>
                <label class="label-text">Remarks / Notes</label>
                <textarea id="fRemarks" rows="3" placeholder="Any notes about this client..." class="input-field" style="resize:none;"></textarea>
              </div>

              <button id="addClientBtn" class="btn-primary">
                <span class="flex items-center justify-center gap-2">
                  <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
                  Add Client
                </span>
              </button>
            </div>
          </div>
        </aside>

        <!-- CLIENT LIST -->
        <main>
          <!-- Filters -->
          <div class="flex flex-wrap gap-2 mb-4">
            <div class="relative flex-1 min-w-[180px]">
              <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4" style="color:var(--text3)" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
              </svg>
              <input id="searchInput" type="text" placeholder="Search by name, phone, location..."
                class="input-field" style="padding-left:36px;border-radius:10px;" />
            </div>
            <select id="filterDeal" class="input-field" style="width:auto;border-radius:10px;">
              <option value="all">All Deals</option>
              <option value="not_started">Not Started</option>
              <option value="talking">In Discussion</option>
              <option value="done">Deal Done</option>
              <option value="rejected">Rejected</option>
              <option value="no_response">No Response</option>
            </select>
            <select id="filterStatus" class="input-field" style="width:auto;border-radius:10px;">
              <option value="all">All Calls</option>
              <option value="not_called">Not Called</option>
              <option value="called">Called</option>
              <option value="follow_up">Follow Up</option>
            </select>
            <button id="clearAllBtn"
              style="font-size:12px; font-weight:600; border:1px solid rgba(239,68,68,0.25); color:#f87171; border-radius:10px; padding:8px 14px; background:transparent; cursor:pointer; white-space:nowrap; transition:background 0.15s;"
              onmouseover="this.style.background='rgba(239,68,68,0.08)'" onmouseout="this.style.background='transparent'">
              <span class="flex items-center gap-1.5">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                Clear All
              </span>
            </button>
          </div>

          <div id="clientsContainer"></div>
        </main>
      </div>
    </div>
  </div>

  <!-- EDIT MODAL -->
  <div id="editModal" class="hidden fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
    <div class="modal-box w-full max-w-lg max-h-[92vh] overflow-y-auto p-6">
      <div class="flex items-center justify-between mb-5">
        <h3 style="font-size:15px; font-weight:800; color:var(--text);">Edit Client</h3>
        <button id="closeEditBtn" class="icon-btn">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <input id="editId" type="hidden" />
      <div class="space-y-3">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="label-text">Client Name</label>
            <input id="editName" type="text" class="input-field" />
          </div>
          <div>
            <label class="label-text">Phone Number</label>
            <input id="editPhone" type="tel" class="input-field" />
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="label-text">Email</label>
            <input id="editEmail" type="email" class="input-field" />
          </div>
          <div>
            <label class="label-text">Location / City</label>
            <input id="editLocation" type="text" class="input-field" />
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="label-text">Company</label>
            <input id="editCompany" type="text" class="input-field" />
          </div>
          <div>
            <label class="label-text">Website URL</label>
            <input id="editWebsite" type="url" class="input-field" />
          </div>
        </div>

        <hr class="divider">

        <div>
          <label class="label-text">Contact Method(s)</label>
          <div class="checkbox-group">
            <label class="cm-toggle" id="eToggleCall">
              <input type="checkbox" id="eMethodCall" />
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
              Call
            </label>
            <label class="cm-toggle" id="eToggleMsg">
              <input type="checkbox" id="eMethodMsg" />
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
              Message
            </label>
            <label class="cm-toggle" id="eToggleEmail">
              <input type="checkbox" id="eMethodEmail" />
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
              Email
            </label>
          </div>
        </div>

        <div class="grid grid-cols-3 gap-3">
          <div>
            <label class="label-text">Reply Status</label>
            <select id="editReply" class="input-field">
              <option value="no">No Reply</option>
              <option value="yes">Replied</option>
            </select>
          </div>
          <div>
            <label class="label-text">Call Status</label>
            <select id="editStatus" class="input-field">
              <option value="not_called">Not Called</option>
              <option value="called">Called</option>
              <option value="follow_up">Follow Up</option>
            </select>
          </div>
          <div>
            <label class="label-text">Deal Status</label>
            <select id="editDeal" class="input-field">
              <option value="not_started">Not Started</option>
              <option value="talking">In Discussion</option>
              <option value="done">Deal Done</option>
              <option value="rejected">Rejected</option>
              <option value="no_response">No Response</option>
            </select>
          </div>
        </div>

        <div>
          <label class="label-text">Remarks / Notes</label>
          <textarea id="editRemarks" rows="3" class="input-field" style="resize:none;"></textarea>
        </div>
      </div>
      <div class="flex gap-3 mt-5">
        <button id="cancelEditBtn"
          style="flex:1; background:var(--surface2); color:var(--text2); border:1px solid var(--border2); border-radius:10px; padding:10px; font-size:13px; font-weight:600; cursor:pointer; transition:background 0.15s;"
          onmouseover="this.style.background='#272d42'" onmouseout="this.style.background=''">
          Cancel
        </button>
        <button id="saveEditBtn" class="btn-primary" style="flex:2;">Save Changes</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "firebase/auth";
    import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc, query, orderBy, serverTimestamp } from "firebase/firestore";

    const firebaseConfig = {
      apiKey: "AIzaSyAk9S7FKg8_fJ7ubU2CRousfQmEozgxTQo",
      authDomain: "study-firebase-8689a.firebaseapp.com",
      projectId: "study-firebase-8689a",
      storageBucket: "study-firebase-8689a.firebasestorage.app",
      messagingSenderId: "10788250863",
      appId: "1:10788250863:web:c9af5b8f339c1ba4eda71a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let allClients = [];

    const $ = id => document.getElementById(id);

    // Checkbox toggle visual
    function setupCmToggle(checkId, toggleId, cls) {
      const chk = $(checkId), tog = $(toggleId);
      chk.addEventListener('change', () => {
        tog.className = 'cm-toggle' + (chk.checked ? ' active-' + cls : '');
      });
    }

    setupCmToggle('fMethodCall', 'fToggleCall', 'call');
    setupCmToggle('fMethodMsg',  'fToggleMsg',  'msg');
    setupCmToggle('fMethodEmail','fToggleEmail','email');
    setupCmToggle('eMethodCall', 'eToggleCall', 'call');
    setupCmToggle('eMethodMsg',  'eToggleMsg',  'msg');
    setupCmToggle('eMethodEmail','eToggleEmail','email');

    function getContactMethods(prefix) {
      const methods = [];
      if ($(prefix + 'MethodCall').checked)  methods.push('call');
      if ($(prefix + 'MethodMsg').checked)   methods.push('msg');
      if ($(prefix + 'MethodEmail').checked) methods.push('email');
      return methods;
    }

    function setContactMethods(prefix, methods) {
      const arr = methods || [];
      const ckCall  = $(prefix + 'MethodCall');
      const ckMsg   = $(prefix + 'MethodMsg');
      const ckEmail = $(prefix + 'MethodEmail');
      ckCall.checked  = arr.includes('call');
      ckMsg.checked   = arr.includes('msg');
      ckEmail.checked = arr.includes('email');
      $(prefix + 'ToggleCall').className  = 'cm-toggle' + (ckCall.checked  ? ' active-call'  : '');
      $(prefix + 'ToggleMsg').className   = 'cm-toggle' + (ckMsg.checked   ? ' active-msg'   : '');
      $(prefix + 'ToggleEmail').className = 'cm-toggle' + (ckEmail.checked ? ' active-email' : '');
    }

    // AUTH
    onAuthStateChanged(auth, user => {
      $('loadingScreen').classList.add('hidden');
      if (user) {
        currentUser = user;
        $('userEmail').textContent = user.email;
        const photo = $('userPhoto');
        if (user.photoURL) { photo.src = user.photoURL; photo.classList.remove('hidden'); }
        $('loginScreen').classList.add('hidden');
        $('appScreen').classList.remove('hidden');
        loadClients();
      } else {
        currentUser = null;
        $('loginScreen').classList.remove('hidden');
        $('appScreen').classList.add('hidden');
      }
    });

    $('googleSignInBtn').addEventListener('click', async () => {
      try { await signInWithPopup(auth, provider); }
      catch (e) { alert('Sign-in failed. Please try again.'); }
    });

    $('signOutBtn').addEventListener('click', () => signOut(auth));

    async function loadClients() {
      try {
        const q = query(collection(db, 'users', currentUser.uid, 'clients'), orderBy('createdAt', 'desc'));
        const snap = await getDocs(q);
        allClients = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderClients();
        updateStats();
      } catch (e) { console.error(e); }
    }

    $('addClientBtn').addEventListener('click', async () => {
      const name = $('fName').value.trim();
      const phone = $('fPhone').value.trim();
      if (!name || !phone) { alert('Name and Phone are required.'); return; }

      const client = {
        name, phone,
        email: $('fEmail').value.trim(),
        location: $('fLocation').value.trim(),
        company: $('fCompany').value.trim(),
        website: $('fWebsite').value.trim(),
        contactMethods: getContactMethods('f'),
        replyStatus: $('fReply').value,
        status: $('fStatus').value,
        dealStatus: $('fDeal').value,
        remarks: $('fRemarks').value.trim(),
        createdAt: serverTimestamp()
      };

      try {
        $('addClientBtn').disabled = true;
        $('addClientBtn').innerHTML = '<span class="flex items-center justify-center gap-2"><svg class="w-4 h-4 spin" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>Adding...</span>';
        await addDoc(collection(db, 'users', currentUser.uid, 'clients'), client);
        ['fName','fPhone','fEmail','fLocation','fCompany','fWebsite','fRemarks'].forEach(id => $(id).value = '');
        $('fStatus').value = 'not_called';
        $('fDeal').value = 'not_started';
        $('fReply').value = 'no';
        setContactMethods('f', []);
        await loadClients();
      } catch (e) { alert('Failed to add client.'); }
      finally {
        $('addClientBtn').disabled = false;
        $('addClientBtn').innerHTML = '<span class="flex items-center justify-center gap-2"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>Add Client</span>';
      }
    });

    $('searchInput').addEventListener('input', renderClients);
    $('filterStatus').addEventListener('change', renderClients);
    $('filterDeal').addEventListener('change', renderClients);

    $('clearAllBtn').addEventListener('click', async () => {
      if (!confirm('Delete ALL clients? This cannot be undone.')) return;
      try {
        const snap = await getDocs(collection(db, 'users', currentUser.uid, 'clients'));
        await Promise.all(snap.docs.map(d => deleteDoc(d.ref)));
        allClients = [];
        renderClients();
        updateStats();
      } catch (e) { alert('Failed to clear clients.'); }
    });

    // CONFIG MAPS
    const dealCfg = {
      done:        { label: 'Deal Done',     cls: 'deal-done',       dot: 'deal-dot-done'       },
      talking:     { label: 'In Discussion', cls: 'deal-talking',    dot: 'deal-dot-talking'    },
      rejected:    { label: 'Rejected',      cls: 'deal-rejected',   dot: 'deal-dot-rejected'   },
      no_response: { label: 'No Response',   cls: 'deal-no_response',dot: 'deal-dot-no_response'},
      not_started: { label: 'Not Started',   cls: 'deal-not_started',dot: 'deal-dot-not_started'}
    };
    const statusCfg = {
      not_called: { label: 'Not Called', cls: 'cs-not_called' },
      called:     { label: 'Called',     cls: 'cs-called'     },
      follow_up:  { label: 'Follow Up',  cls: 'cs-follow_up'  }
    };
    const methodCfg = {
      call:  { label: 'Call',    cls: 'cm-call',  dot: 'cm-dot-call',  icon: `<svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>` },
      msg:   { label: 'Message', cls: 'cm-msg',   dot: 'cm-dot-msg',   icon: `<svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>` },
      email: { label: 'Email',   cls: 'cm-email', dot: 'cm-dot-email', icon: `<svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>` }
    };

    function renderClients() {
      const search = $('searchInput').value.toLowerCase();
      const filterS = $('filterStatus').value;
      const filterD = $('filterDeal').value;

      const filtered = allClients.filter(c => {
        const matchSearch = c.name.toLowerCase().includes(search)
          || c.phone.includes(search)
          || (c.location || '').toLowerCase().includes(search)
          || (c.company || '').toLowerCase().includes(search);
        const matchStatus = filterS === 'all' || c.status === filterS;
        const matchDeal   = filterD === 'all' || c.dealStatus === filterD;
        return matchSearch && matchStatus && matchDeal;
      });

      const container = $('clientsContainer');

      if (filtered.length === 0) {
        container.innerHTML = `
          <div style="text-align:center; padding:60px 0; color:var(--text3);">
            <svg style="width:48px;height:48px;margin:0 auto 12px;opacity:0.3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            <p style="font-size:14px;font-weight:600;">${allClients.length === 0 ? 'No clients yet. Add your first one.' : 'No results match your filters.'}</p>
          </div>`;
        return;
      }

      container.innerHTML = filtered.map((c, idx) => {
        const initials = c.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
        const d = dealCfg[c.dealStatus] || dealCfg.not_started;
        const s = statusCfg[c.status] || statusCfg.not_called;
        const methods = (c.contactMethods || []).map(m => methodCfg[m]).filter(Boolean);
        const replied = c.replyStatus === 'yes';
        const dateStr = c.createdAt?.toDate
          ? c.createdAt.toDate().toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })
          : 'Just now';

        const avatarColors = ['#3b82f6','#6366f1','#8b5cf6','#06b6d4','#10b981','#f59e0b'];
        const color = avatarColors[c.name.charCodeAt(0) % avatarColors.length];

        return `
        <div class="client-card fade-up" style="animation-delay:${Math.min(idx * 30, 300)}ms">
          <div class="flex items-start justify-between gap-3">
            <div class="flex items-center gap-3 min-w-0">
              <div style="width:40px;height:40px;border-radius:12px;background:${color}22;border:1px solid ${color}44;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:${color};flex-shrink:0;">${initials}</div>
              <div class="min-w-0">
                <p style="font-weight:700;font-size:14px;color:var(--text);" class="truncate">${esc(c.name)}</p>
                <div class="flex items-center gap-2 flex-wrap mt-0.5">
                  <a href="tel:${esc(c.phone)}" style="color:var(--accent);font-size:12px;font-weight:500;" class="hover:underline mono">${esc(c.phone)}</a>
                  ${c.location ? `<span style="color:var(--text3);font-size:11px;display:flex;align-items:center;gap:3px;">
                    <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    ${esc(c.location)}</span>` : ''}
                  ${c.company ? `<span style="color:var(--text3);font-size:11px;display:flex;align-items:center;gap:3px;">
                    <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                    ${esc(c.company)}</span>` : ''}
                </div>
              </div>
            </div>
            <div class="flex items-center gap-1.5 flex-shrink-0">
              <button onclick="openEdit('${c.id}')" class="icon-btn" title="Edit">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
              </button>
              <button onclick="deleteClient('${c.id}')" class="icon-btn danger" title="Delete">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
              </button>
            </div>
          </div>

          <!-- Badges row -->
          <div class="flex flex-wrap gap-1.5 mt-3">
            <span class="badge ${d.cls}"><span class="badge-dot ${d.dot}"></span>${d.label}</span>
            <span class="badge ${s.cls}">${s.label}</span>
            <span class="badge ${replied ? 'reply-yes' : 'reply-no'}">
              <span class="badge-dot ${replied ? 'reply-dot-yes' : 'reply-dot-no'}"></span>
              ${replied ? 'Replied' : 'No Reply'}
            </span>
            ${methods.map(m => `<span class="badge ${m.cls}">${m.icon} ${m.label}</span>`).join('')}
          </div>

          <!-- Extra info row -->
          <div class="flex flex-wrap gap-3 mt-2.5">
            ${c.email ? `<a href="mailto:${esc(c.email)}" style="color:var(--text3);font-size:11px;display:flex;align-items:center;gap:4px;" class="hover:underline">
              <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
              ${esc(c.email)}</a>` : ''}
            ${c.website ? `<a href="${esc(c.website)}" target="_blank" rel="noopener" style="color:var(--text3);font-size:11px;display:flex;align-items:center;gap:4px;" class="hover:underline truncate max-w-xs">
              <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
              ${esc(c.website)}</a>` : ''}
          </div>

          ${c.remarks ? `
          <div style="margin-top:10px;background:var(--bg);border-left:2px solid var(--border2);border-radius:0 6px 6px 0;padding:8px 10px;font-size:12px;color:var(--text2);line-height:1.5;">
            ${esc(c.remarks)}
          </div>` : ''}

          <p style="color:var(--text3);font-size:11px;margin-top:8px;display:flex;align-items:center;gap:4px;">
            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            Added ${dateStr}
          </p>
        </div>`;
      }).join('');
    }

    function updateStats() {
      $('statTotal').textContent = allClients.length;
      $('statDone').textContent = allClients.filter(c => c.dealStatus === 'done').length;
      $('statTalking').textContent = allClients.filter(c => c.dealStatus === 'talking').length;
      $('statRejected').textContent = allClients.filter(c => c.dealStatus === 'rejected').length;
      $('statNoResp').textContent = allClients.filter(c => c.dealStatus === 'no_response').length;
      $('statFollowUp').textContent = allClients.filter(c => c.status === 'follow_up').length;
    }

    window.deleteClient = async function(id) {
      if (!confirm('Delete this client?')) return;
      try {
        await deleteDoc(doc(db, 'users', currentUser.uid, 'clients', id));
        await loadClients();
      } catch (e) { alert('Failed to delete.'); }
    };

    window.openEdit = function(id) {
      const c = allClients.find(x => x.id === id);
      if (!c) return;
      $('editId').value = id;
      $('editName').value = c.name;
      $('editPhone').value = c.phone;
      $('editEmail').value = c.email || '';
      $('editLocation').value = c.location || '';
      $('editCompany').value = c.company || '';
      $('editWebsite').value = c.website || '';
      $('editStatus').value = c.status;
      $('editDeal').value = c.dealStatus || 'not_started';
      $('editReply').value = c.replyStatus || 'no';
      $('editRemarks').value = c.remarks || '';
      setContactMethods('e', c.contactMethods || []);
      $('editModal').classList.remove('hidden');
    };

    $('cancelEditBtn').addEventListener('click', () => $('editModal').classList.add('hidden'));
    $('closeEditBtn').addEventListener('click', () => $('editModal').classList.add('hidden'));
    $('editModal').addEventListener('click', e => {
      if (e.target === $('editModal')) $('editModal').classList.add('hidden');
    });

    $('saveEditBtn').addEventListener('click', async () => {
      const id = $('editId').value;
      const name = $('editName').value.trim();
      const phone = $('editPhone').value.trim();
      if (!name || !phone) { alert('Name and Phone are required.'); return; }
      try {
        $('saveEditBtn').textContent = 'Saving...';
        await updateDoc(doc(db, 'users', currentUser.uid, 'clients', id), {
          name, phone,
          email: $('editEmail').value.trim(),
          location: $('editLocation').value.trim(),
          company: $('editCompany').value.trim(),
          website: $('editWebsite').value.trim(),
          contactMethods: getContactMethods('e'),
          replyStatus: $('editReply').value,
          status: $('editStatus').value,
          dealStatus: $('editDeal').value,
          remarks: $('editRemarks').value.trim()
        });
        $('editModal').classList.add('hidden');
        await loadClients();
      } catch (e) { alert('Failed to save.'); }
      finally { $('saveEditBtn').textContent = 'Save Changes'; }
    });

    function esc(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
